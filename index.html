<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="container">

        <div class="music-player">

            <h1>Music Player</h1>

            <!-- Album Cover -->

            <img src="images/cover1.jpg"
                class="cover"
                id="cover">

            <!-- Song Name -->

            <h2 id="title">

                Song Title

            </h2>

            <!-- Artist -->

            <p id="artist">

                Artist Name

            </p>

            <!-- Audio -->

            <audio id="audio"></audio>

            <!-- Progress -->

            <input
                type="range"
                id="progress"
                value="0"
                min="0"
                max="100">

            <!-- Time -->

            <div class="time">

                <span id="current">

                    00:00

                </span>

                <span id="duration">

                    00:00

                </span>

            </div>

            <!-- Controls -->

            <div class="controls">

                <button id="prev">

                    <i class="fa-solid fa-backward"></i>

                </button>

                <button id="play">

                    <i class="fa-solid fa-play"></i>

                </button>

                <button id="next">

                    <i class="fa-solid fa-forward"></i>

                </button>

            </div>

            <!-- Volume -->

            <div class="volume">

                <i class="fa-solid fa-volume-high"></i>

                <input
                    type="range"
                    id="volume"
                    min="0"
                    max="1"
                    step="0.1"
                    value="1">

            </div>

            <!-- Playlist -->

            <div class="playlist">

                <h3>Playlist</h3>

                <ul id="playlist">

                    <li data-index="0">

                        🎵 Song 1

                    </li>

                    <li data-index="1">

                        🎵 Song 2

                    </li>

                    <li data-index="2">

                        🎵 Song 3

                    </li>

                </ul>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
